<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tengri Medya - Soru Kazan</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f9; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-screen" class="card">
        <h2>Tengri Medya'ya Hoş Geldin</h2>
        <input type="text" id="username" placeholder="Adın Soyadın">
        <input type="tel" id="phone" placeholder="Telefon Numaran">
        <button onclick="saveUser()">Giriş Yap ve Kazanmaya Başla</button>
    </div>

    <div id="game-screen" class="card" style="display:none;">
        <h2 id="welcome-msg"></h2>
        <div id="question-area">Burada sorular belirecek...</div>
    </div>

    <script>
        function saveUser() {
            const name = document.getElementById('username').value;
            const phone = document.getElementById('phone').value;
            if(name && phone) {
                localStorage.setItem('userName', name);
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'block';
                document.getElementById('welcome-msg').innerText = "Merhaba, " + name;
            } else {
                alert("Lütfen tüm alanları doldur!");
            }
        }
        
        // Eğer daha önce giriş yaptıysa direkt oyunu göster
        if(localStorage.getItem('userName')) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('welcome-msg').innerText = "Tekrar Hoş Geldin, " + localStorage.getItem('userName');
        }
    </script>
</body>
</html>
