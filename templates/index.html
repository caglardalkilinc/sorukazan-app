<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Soru Çöz Kazan | Profesyonel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .card { background: #1e293b; border: none; border-radius: 20px; color: white; }
        .btn-ad { background: #8b5cf6; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; margin-top: 10px; }
    </style>
</head>
<body class="container py-4">
    <div class="text-center mb-4">
        <h2>Soru Çöz Kazan</h2>
        <p class="text-muted">Çağlar Dalkılınç Platformu</p>
    </div>

    <div class="card p-4 text-center mb-4">
        <h5>Cüzdanın</h5>
        <h1 id="balance">0.00 TL</h1>
    </div>

    <div class="card p-3 mb-4">
        <h6>🚀 Hızlı Kazanç</h6>
        <button class="btn-ad" onclick="reklamIzle()">Reklam İzle (0.10 TL)</button>
    </div>

    <div id="sorular">
        {% for s in sorular %}
        <div class="card p-3 mb-3">
            <p>{{ s.soru }}</p>
            <div class="d-grid gap-2">
                <button class="btn btn-outline-light" onclick="kontrol('{{ s.a }}', '{{ s.dogru }}', {{ s.odul }})">{{ s.a }}</button>
                <button class="btn btn-outline-light" onclick="kontrol('{{ s.b }}', '{{ s.dogru }}', {{ s.odul }})">{{ s.b }}</button>
            </div>
        </div>
        {% endfor %}
    </div>

    <script>
        let bakiye = 0;
        function kontrol(secilen, dogru, odul) {
            if(secilen == dogru) {
                bakiye += parseFloat(odul);
                document.getElementById('balance').innerText = bakiye.toFixed(2) + " TL";
                alert("Tebrikler! Doğru cevap.");
            } else { alert("Yanlış."); }
        }
        function reklamIzle() {
            // Buraya reklam kodu gelecek
            bakiye += 0.10;
            document.getElementById('balance').innerText = bakiye.toFixed(2) + " TL";
            alert("Reklam izlendi, 0.10 TL cüzdanına eklendi!");
        }
    </script>
</body>
</html>
