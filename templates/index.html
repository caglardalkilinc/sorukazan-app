<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çağlar Dalkılınç | Görev Merkezi</title>
    <style>
        :root { --accent: #6200ea; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 20px; }
        .avatar { width: 80px; height: 80px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 24px; font-weight: bold; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .btn-wa { background: #25D366; color: white; padding: 15px; border-radius: 12px; text-decoration: none; display: block; text-align: center; font-weight: bold; }
        .task-list { list-style: none; padding: 0; }
        .task-item { background: #334155; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="header">
        <div class="avatar">ÇD</div>
        <h2>Çağlar Dalkılınç</h2>
        <p>Dijital Görev ve Kazanç Portalı</p>
    </div>

    <div class="card">
        <h3>💰 Cüzdan Bakiyen</h3>
        <h1 id="balance" style="color: #10b981;">0.00 TL</h1>
    </div>

    <div class="card">
        <h3>🚀 Güncel Görevler</h3>
        <div class="task-list">
            <div class="task-item"><span>Instagram Takip</span> <span>+0.50 TL</span></div>
            <div class="task-item"><span>Video İzle</span> <span>+0.20 TL</span></div>
        </div>
        <a href="https://wa.me/905XXXXXXXXXX?text=Merhaba, görev tamamladım." class="btn-wa">WhatsApp Destek & Kanıt</a>
    </div>
</body>
</html>
