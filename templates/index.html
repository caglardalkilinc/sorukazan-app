<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tengri Medya - Görev Merkezi</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 0; padding: 15px; }
        .nav { display: flex; justify-content: space-between; padding: 10px; background: #1e1e1e; border-radius: 10px; }
        .card { background: #252525; padding: 15px; border-radius: 15px; margin-top: 15px; }
        .btn { width: 100%; padding: 12px; background: #e91e63; border: none; color: white; border-radius: 10px; margin: 5px 0; cursor: pointer; }
        .task { border-bottom: 1px solid #444; padding: 10px 0; }
    </style>
</head>
<body>
    <div class="nav">
        <span>Tengri Medya</span>
        <span>Bakiyen: 0.00 TL</span>
    </div>

    <div class="card">
        <h3>💰 Görev Merkezi</h3>
        <div class="task">📱 Instagram'da bizi takip et: +0.50 TL</div>
        <div class="task">🎬 Reklam izle, bakiye kazan: +0.20 TL</div>
        <button class="btn" onclick="sendProof()">Kanıt Gönder (WhatsApp)</button>
    </div>

    <div class="card">
        <h3>⚙️ Ayarlar</h3>
        <p>İsim: [Çağlar Dalkılınç]</p>
        <p>IBAN: Henüz tanımlanmadı</p>
    </div>

    <script>
        function sendProof() {
            window.location.href = "https://wa.me/905XXXXXXXXXX?text=Merhaba, sosyal medya görevini tamamladım, kanıt gönderiyorum.";
        }
    </script>
</body>
</html>
