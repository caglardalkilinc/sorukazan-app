<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soru Çöz Kazan</title>
    <style>
        :root { --accent: #f59e0b; --bg: #1e293b; --card: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 20px; }
        .logo-placeholder { width: 80px; height: 80px; background: var(--accent); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-weight: bold; font-size: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 15px; }
        .btn-wa { background: #25D366; color: white; padding: 15px; border-radius: 12px; text-decoration: none; display: block; text-align: center; font-weight: bold; margin-top: 10px; }
        .task-item { background: #475569; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-placeholder">SÇK</div>
        <h2>Soru Çöz Kazan</h2>
        <p>Çağlar Dalkılınç Güvencesiyle</p>
    </div>

    <div class="card">
        <h3>💰 Cüzdan Bakiyen</h3>
        <h1 id="balance" style="color: #fbbf24;">0.00 TL</h1>
    </div>

    <div class="card">
        <h3>🚀 Görevler & Sorular</h3>
        <div class="task-item"><span>Genel Kültür Sorusu</span> <span>+0.25 TL</span></div>
        <div class="task-item"><span>Video Reklam İzle</span> <span>+0.10 TL</span></div>
        <a href="https://wa.me/905XXXXXXXXXX?text=Merhaba, görev tamamladım." class="btn-wa">WhatsApp Destek & Kanıt</a>
    </div>
</body>
</html>
